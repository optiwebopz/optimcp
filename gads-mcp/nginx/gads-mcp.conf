# File: /gads-mcp/nginx/gads-mcp.conf
# OptiMCP Google Ads MCP — Nginx Config
# Version: 1.0.0
#
# Usage:
#   Replace YOUR_DOMAIN with e.g. gads-mcp.yourdomain.com
#   cp gads-mcp.conf /etc/nginx/sites-available/gads-mcp.conf
#   ln -s /etc/nginx/sites-available/gads-mcp.conf /etc/nginx/sites-enabled/
#   certbot --nginx -d YOUR_DOMAIN
#   nginx -t && systemctl reload nginx
#
# OR: run on same server as OptiMCP using a different subdomain/path

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL filled in by Certbot
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;

    location ~ ^/(mcp|health|dashboard) {
        proxy_pass         http://127.0.0.1:3848;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    45s;
        proxy_read_timeout    45s;
        client_max_body_size  512k;
    }

    location / { return 404; }
}
